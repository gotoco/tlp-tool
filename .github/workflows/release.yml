name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Generate man page
        run: |
          mkdir -p assets
          ./target/release/rtlp-tool --man | gzip > assets/rtlp-tool.1.gz

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Detect architecture
        id: arch
        run: echo "ARCH=$(dpkg --print-architecture)" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          cp target/release/rtlp-tool rtlp-tool-${{ steps.version.outputs.VERSION }}-${{ steps.arch.outputs.ARCH }}
          cp target/debian/*.deb rtlp-tool-${{ steps.version.outputs.VERSION }}-${{ steps.arch.outputs.ARCH }}.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            rtlp-tool-${{ steps.version.outputs.VERSION }}-${{ steps.arch.outputs.ARCH }}
            rtlp-tool-${{ steps.version.outputs.VERSION }}-${{ steps.arch.outputs.ARCH }}.deb
