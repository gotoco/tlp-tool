name: Release

on:
  push:
    tags:
      - 'v*.*.*'

  # Allow triggering a release manually from the GitHub Actions UI
  # (useful for re-running a failed release or publishing a hotfix)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.1) — must already exist in the repo'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

# ── Binary builds (matrix) ─────────────────────────────────────────────────────
jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - name: Linux x86_64 (static)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset: rtlp-tool-linux-x86_64.tar.gz
            use_cross: false

          - name: Linux aarch64 (static)
            os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            asset: rtlp-tool-linux-aarch64.tar.gz
            use_cross: true

          # ── macOS ──────────────────────────────────────────────────────────
          - name: macOS x86_64
            os: macos-13
            target: x86_64-apple-darwin
            asset: rtlp-tool-macos-x86_64.tar.gz
            use_cross: false

          - name: macOS aarch64 (Apple Silicon)
            os: macos-14
            target: aarch64-apple-darwin
            asset: rtlp-tool-macos-aarch64.tar.gz
            use_cross: false

          # ── Windows ────────────────────────────────────────────────────────
          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: rtlp-tool-windows-x86_64.zip
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Linux-specific setup ──────────────────────────────────────────────
      - name: Install musl-tools (x86_64 static)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 cross-compile)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package tar.gz (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ matrix.asset }}" \
            -C "target/${{ matrix.target }}/release" \
            rtlp-tool

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/rtlp-tool.exe" `
            -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

# ── Debian .deb package ────────────────────────────────────────────────────────
  deb:
    name: Debian package (.deb)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb
        run: cargo deb --no-strip

      - name: Rename artifact
        run: |
          VERSION="${RELEASE_TAG#v}"
          cp target/debian/*.deb "rtlp-tool-${VERSION}-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "*.deb"

# ── RPM package ────────────────────────────────────────────────────────────────
  rpm:
    name: RPM package (.rpm)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip -s target/release/rtlp-tool

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Rename artifact
        run: |
          VERSION="${RELEASE_TAG#v}"
          cp target/generate-rpm/*.rpm "rtlp-tool-${VERSION}-x86_64.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: "*.rpm"

# ── FreeBSD binary ─────────────────────────────────────────────────────────────
  freebsd:
    name: FreeBSD x86_64 binary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y rust
          run: |
            cargo build --release
            tar czf rtlp-tool-freebsd-x86_64.tar.gz \
              -C target/release rtlp-tool

      - uses: actions/upload-artifact@v4
        with:
          name: freebsd-binary
          path: rtlp-tool-freebsd-x86_64.tar.gz

# ── Create GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, deb, rpm, freebsd]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true
          make_latest: true
